<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Carson Kane</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../assets/img/1de40967-0bdb-4b9b-9034-5113f59c5ee7.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .social-grid {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .social-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .social-link:hover {
            color: var(--accent-primary);
        }
    </style>
</head>
<body>
    <site-header></site-header>

    <main class="container">
        <section class="card" style="max-width: 800px; margin: 0 auto;">
            <h1>Ponte en contacto</h1>
            <p style="margin-bottom: 2rem; font-size: 1.1rem;">
                Para consultas institucionales, desarrollo de planes de estudio o disponibilidad para clases particulares en Berlín, por favor contáctame por correo electrónico.
            </p>

            <div style="background: var(--bg-canvas); padding: 1.5rem; border-radius: 4px; margin-bottom: 2rem;">
                <h3 style="margin-bottom: 0.5rem;">Correspondencia Directa</h3>
                <a href="mailto:carson.s.kane9@gmail.com" style="font-size: 1.2rem; font-weight: 600;">carson.s.kane9@gmail.com</a>
            </div>

            <hr class="section-divider" style="margin: 2rem 0;">

            <h3>Red Profesional y Medios Digitales</h3>
            <div class="social-grid">
                <a href="https://www.linkedin.com/in/carson-kane-a1525b186/" target="_blank" rel="noopener noreferrer" class="social-link">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://github.com/carsonkane" target="_blank" rel="noopener noreferrer" class="social-link">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="https://buymeacoffee.com/carc1n" target="_blank" rel="noopener noreferrer" class="social-link">
                    <i class="fas fa-coffee"></i> Apoyarme
                </a>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <script src="../components-es.js"></script>
</body>
</html>
